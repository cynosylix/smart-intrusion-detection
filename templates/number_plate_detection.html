<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Plate Detection - Smart Intrusion Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            position: relative;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .close-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        .video-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .video-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .video-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(156, 39, 176, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #424242 0%, #212121 100%);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #757575 0%, #616161 100%);
            color: white;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(117, 117, 117, 0.4);
        }
        
        .stats-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .stat-card.plate {
            border-top: 4px solid #9c27b0;
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .stat-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }
        
        .stat-count {
            font-size: 2em;
            font-weight: bold;
            color: #9c27b0;
        }
        
        .stat-details {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.active {
            background: #9c27b0;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .plate-texts {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .plate-texts-title {
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
        }
        
        .plate-tag {
            display: inline-block;
            background: #f3e5f5;
            color: #4a148c;
            padding: 8px 15px;
            border-radius: 15px;
            margin: 5px 5px 0 0;
            font-size: 1em;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }
        
        .alert-banner {
            background: #ff9800;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            display: none;
            animation: shake 0.5s;
        }
        
        .alert-banner.show {
            display: block;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="close-btn" onclick="window.close()">✕ Close</button>
            <h1>🚗 Number Plate Detection System</h1>
            <p>Real-time License Plate Detection and OCR Recognition</p>
        </div>
        
        <div class="alert-banner" id="alertBanner">
            ⚠️ NUMBER PLATE DETECTED! License plate detected and read.
        </div>
        
        <div class="main-content">
            <div class="video-section">
                <h2>Live Number Plate Detection Feed</h2>
                <div class="video-container">
                    <img src="{{ url_for('plate_video_feed') }}" alt="Number Plate Detection Feed" id="videoFeed">
                </div>
                <div class="controls">
                    <button class="btn btn-primary" onclick="startDetection()">▶ Start Detection</button>
                    <button class="btn btn-danger" onclick="stopDetection()">⏹ Stop Detection</button>
                    <button class="btn btn-secondary" onclick="resetStats()">🔄 Reset Stats</button>
                </div>
            </div>
            
            <div class="stats-section">
                <div class="stat-card plate">
                    <div class="stat-header">
                        <span class="stat-title">🚗 Number Plate</span>
                        <span class="stat-count" id="plateCount">0</span>
                    </div>
                    <div class="stat-details">
                        <span class="status-indicator" id="plateIndicator"></span>
                        <span id="plateStatus">No plates detected</span>
                    </div>
                    <div class="plate-texts">
                        <div class="plate-texts-title">Detected Plates:</div>
                        <div id="plateTexts">None</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let updateInterval;
        
        function updateStats() {
            fetch('/plate_stats')
                .then(response => response.json())
                .then(data => {
                    // Update plate detection stats
                    document.getElementById('plateCount').textContent = data.plate.count || 0;
                    const plateDetected = data.plate.detected || false;
                    const plateIndicator = document.getElementById('plateIndicator');
                    const plateStatus = document.getElementById('plateStatus');
                    const alertBanner = document.getElementById('alertBanner');
                    const plateTextsDiv = document.getElementById('plateTexts');
                    
                    if (plateDetected) {
                        plateIndicator.classList.add('active');
                        plateStatus.textContent = 'Plate detected!';
                        alertBanner.classList.add('show');
                        
                        // Display detected plate texts
                        if (data.plate.texts && data.plate.texts.length > 0) {
                            plateTextsDiv.innerHTML = data.plate.texts.map(text => 
                                `<span class="plate-tag">${text}</span>`
                            ).join('');
                        } else {
                            plateTextsDiv.textContent = 'Text not readable';
                        }
                    } else {
                        plateIndicator.classList.remove('active');
                        plateStatus.textContent = 'No plates detected';
                        alertBanner.classList.remove('show');
                        plateTextsDiv.textContent = 'None';
                    }
                })
                .catch(error => {
                    console.error('Error fetching stats:', error);
                });
        }
        
        function startDetection() {
            fetch('/plate_start')
                .then(response => response.json())
                .then(data => {
                    console.log('Detection started:', data);
                    if (!updateInterval) {
                        updateInterval = setInterval(updateStats, 500);
                    }
                })
                .catch(error => {
                    console.error('Error starting detection:', error);
                });
        }
        
        function stopDetection() {
            fetch('/plate_stop')
                .then(response => response.json())
                .then(data => {
                    console.log('Detection stopped:', data);
                    if (updateInterval) {
                        clearInterval(updateInterval);
                        updateInterval = null;
                    }
                })
                .catch(error => {
                    console.error('Error stopping detection:', error);
                });
        }
        
        function resetStats() {
            fetch('/plate_reset')
                .then(response => response.json())
                .then(data => {
                    console.log('Stats reset:', data);
                    updateStats();
                })
                .catch(error => {
                    console.error('Error resetting stats:', error);
                });
        }
        
        // Start updating stats automatically
        startDetection();
        updateInterval = setInterval(updateStats, 500);
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
            stopDetection();
        });
    </script>
</body>
</html>
